<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GC Demo Table Creator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; padding: 2rem; }
  .card { background: #fff; border-radius: 10px; border: 1px solid #e0e0e0; padding: 1.5rem 2rem; max-width: 760px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
  label { font-size: 12px; font-weight: 500; color: #555; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  input { width: 100%; border: 1px solid #d0d0d0; border-radius: 6px; padding: 8px 10px; font-size: 14px; margin-bottom: 14px; }
  input:focus { outline: none; border-color: #0070f3; }
  .row { display: flex; gap: 10px; }
  .row input { margin-bottom: 0; }
  .actions { display: flex; gap: 10px; margin: 1rem 0; align-items: center; flex-wrap: wrap; }
  button { border-radius: 6px; padding: 9px 18px; font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid #d0d0d0; background: #fff; }
  button.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  button.primary:disabled { background: #888; border-color: #888; cursor: not-allowed; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .table-grid { margin: 1rem 0; display: grid; gap: 6px; }
  .trow { display: flex; align-items: center; gap: 10px; padding: 9px 12px; background: #f9f9f9; border-radius: 6px; border: 1px solid #eee; }
  .badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
  .shared { background: #e8f0fe; color: #1a56db; }
  .retail { background: #e6f4ea; color: #1e7e34; }
  .tname { font-family: monospace; font-size: 13px; flex: 1; }
  .tid { font-family: monospace; font-size: 11px; color: #555; margin-top: 2px; display: none; }
  .tstatus { font-size: 12px; min-width: 90px; text-align: right; color: #888; }
  .tstatus.creating { color: #d97706; }
  .tstatus.done { color: #16a34a; font-weight: 600; }
  .tstatus.error { color: #dc2626; }
  .progress { height: 4px; background: #eee; border-radius: 2px; margin: 0.75rem 0; overflow: hidden; }
  .progress-fill { height: 100%; background: #16a34a; width: 0%; transition: width 0.3s; }
  .output { background: #1a1a1a; color: #e0e0e0; border-radius: 8px; padding: 14px 16px; font-family: monospace; font-size: 13px; white-space: pre; margin-top: 1.25rem; display: none; line-height: 1.7; }
  .msg { font-size: 13px; color: #555; }
  .msg.err { color: #dc2626; }
  .divider { border: none; border-top: 1px solid #eee; margin: 1.25rem 0; }
  .auth-hint { font-size: 12px; color: #888; margin-top: -10px; margin-bottom: 14px; }
</style>
</head>
<body>
<div class="card">
  <h1>GC Demo Platform — Table Creator</h1>
  <p class="sub">Creates all 8 data tables in your Genesys Cloud org via the Data Tables API.</p>

  <label>Genesys Cloud region base URL</label>
  <input type="text" id="baseUrl" placeholder="https://api.mypurecloud.com" />

  <label>Bearer access token</label>
  <input type="password" id="token" placeholder="Paste token from OAuth implicit grant" />
  <p class="auth-hint">Tip: After your implicit grant redirect, the token is in the URL hash after <code>access_token=</code></p>

  <hr class="divider">

  <label>Tables (8)</label>
  <div class="table-grid" id="tableGrid"></div>
  <div class="progress"><div class="progress-fill" id="progressFill"></div></div>

  <div class="actions">
    <button class="primary" id="createBtn" onclick="createAll()">Create all 8 tables</button>
    <button id="copyBtn" onclick="copyIds()" disabled>Copy IDs to clipboard</button>
    <span class="msg" id="statusMsg"></span>
  </div>

  <div class="output" id="output"></div>
</div>

<script>
const TABLES = [
  { name: "gc_demo_jh_shared_demo_config", scope: "shared" },
  { name: "gc_demo_jh_shared_customers_by_phone", scope: "shared" },
  { name: "gc_demo_jh_retail_customers", scope: "retail" },
  { name: "gc_demo_jh_retail_transactions", scope: "retail" },
  { name: "gc_demo_jh_retail_fulfillment", scope: "retail" },
  { name: "gc_demo_jh_retail_cases", scope: "retail" },

];

  "gc_demo_jh_retail_cases": {"$schema":"http://json-schema.org/draft-04/schema#","title":"gc_demo_jh_retail_cases","type":"object","additionalProperties":false,"required":["key"],"properties":{"key":{"title":"key","type":"string","$id":"/properties/key","displayOrder":0},"customer_id":{"title":"customer_id","type":"string","default":"","$id":"/properties/customer_id","displayOrder":1},"case_type":{"title":"case_type","type":"string","default":"","$id":"/properties/case_type","displayOrder":2},"case_title":{"title":"case_title","type":"string","default":"","$id":"/properties/case_title","displayOrder":3},"status":{"title":"status","type":"string","default":"","$id":"/properties/status","displayOrder":4},"current_stage":{"title":"current_stage","type":"string","default":"","$id":"/properties/current_stage","displayOrder":5},"stage_1_owner":{"title":"stage_1_owner","type":"string","default":"","$id":"/properties/stage_1_owner","displayOrder":6},"stage_1_status":{"title":"stage_1_status","type":"string","default":"","$id":"/properties/stage_1_status","displayOrder":7},"stage_2_owner":{"title":"stage_2_owner","type":"string","default":"","$id":"/properties/stage_2_owner","displayOrder":8},"stage_2_status":{"title":"stage_2_status","type":"string","default":"","$id":"/properties/stage_2_status","displayOrder":9},"stage_3_owner":{"title":"stage_3_owner","type":"string","default":"","$id":"/properties/stage_3_owner","displayOrder":10},"stage_3_status":{"title":"stage_3_status","type":"string","default":"","$id":"/properties/stage_3_status","displayOrder":11},"priority":{"title":"priority","type":"string","default":"","$id":"/properties/priority","displayOrder":12},"sla_hours":{"title":"sla_hours","type":"string","default":"","$id":"/properties/sla_hours","displayOrder":13},"opened_date":{"title":"opened_date","type":"string","default":"","$id":"/properties/opened_date","displayOrder":14},"due_date":{"title":"due_date","type":"string","default":"","$id":"/properties/due_date","displayOrder":15},"resolution":{"title":"resolution","type":"string","default":"","$id":"/properties/resolution","displayOrder":16},"linked_transaction_id":{"title":"linked_transaction_id","type":"string","default":"","$id":"/properties/linked_transaction_id","displayOrder":17},"linked_conversation_id":{"title":"linked_conversation_id","type":"string","default":"","$id":"/properties/linked_conversation_id","displayOrder":18},"demo_config_key":{"title":"demo_config_key","type":"string","default":"","$id":"/properties/demo_config_key","displayOrder":19}}},
  "gc_demo_jh_retail_journey_events": {"$schema":"http://json-schema.org/draft-04/schema#","title":"gc_demo_jh_retail_journey_events","type":"object","additionalProperties":false,"required":["key"],"properties":{"key":{"title":"key","type":"string","$id":"/properties/key","displayOrder":0},"customer_id":{"title":"customer_id","type":"string","default":"","$id":"/properties/customer_id","displayOrder":1},"event_date":{"title":"event_date","type":"string","default":"","$id":"/properties/event_date","displayOrder":2},"channel":{"title":"channel","type":"string","default":"","$id":"/properties/channel","displayOrder":3},"direction":{"title":"direction","type":"string","default":"","$id":"/properties/direction","displayOrder":4},"event_type":{"title":"event_type","type":"string","default":"","$id":"/properties/event_type","displayOrder":5},"summary":{"title":"summary","type":"string","default":"","$id":"/properties/summary","displayOrder":6},"outcome":{"title":"outcome","type":"string","default":"","$id":"/properties/outcome","displayOrder":7},"agent_name":{"title":"agent_name","type":"string","default":"","$id":"/properties/agent_name","displayOrder":8},"queue_name":{"title":"queue_name","type":"string","default":"","$id":"/properties/queue_name","displayOrder":9},"duration_seconds":{"title":"duration_seconds","type":"string","default":"","$id":"/properties/duration_seconds","displayOrder":10},"sentiment":{"title":"sentiment","type":"string","default":"","$id":"/properties/sentiment","displayOrder":11},"linked_case_id":{"title":"linked_case_id","type":"string","default":"","$id":"/properties/linked_case_id","displayOrder":12},"conversation_id":{"title":"conversation_id","type":"string","default":"","$id":"/properties/conversation_id","displayOrder":13},"demo_config_key":{"title":"demo_config_key","type":"string","default":"","$id":"/properties/demo_config_key","displayOrder":14}}},

};

const results = {};

function renderGrid() {
  const grid = document.getElementById('tableGrid');
  grid.innerHTML = TABLES.map((t, i) => `
    <div class="trow" id="row-${i}">
      <span class="badge ${t.scope}">${t.scope}</span>
      <div style="flex:1">
        <div class="tname">${t.name}</div>
        <div class="tid" id="id-${i}"></div>
      </div>
      <span class="tstatus" id="status-${i}">pending</span>
    </div>
  `).join('');
}

function setStatus(i, text, cls) {
  const el = document.getElementById(`status-${i}`);
  el.textContent = text;
  el.className = `tstatus ${cls}`;
}

async function createTable(baseUrl, token, table, index) {
  setStatus(index, 'creating...', 'creating');
  const body = { name: table.name, schema: SCHEMAS[table.name] };
  try {
    const res = await fetch(`${baseUrl.replace(/\/$/, '')}/api/v2/datatables`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) {
      const msg = data.message || `HTTP ${res.status}`;
      setStatus(index, `error: ${msg.substring(0, 30)}`, 'error');
      console.error(table.name, data);
      return null;
    }
    results[table.name] = data.id;
    setStatus(index, 'created', 'done');
    const idEl = document.getElementById(`id-${index}`);
    idEl.textContent = `ID: ${data.id}`;
    idEl.style.display = 'block';
    return data.id;
  } catch(e) {
    setStatus(index, 'network error', 'error');
    console.error(table.name, e);
    return null;
  }
}

async function createAll() {
  const baseUrl = document.getElementById('baseUrl').value.trim();
  const token = document.getElementById('token').value.trim();
  if (!baseUrl || !token) {
    document.getElementById('statusMsg').textContent = 'Please fill in both fields.';
    return;
  }
  const btn = document.getElementById('createBtn');
  btn.disabled = true;
  btn.textContent = 'Creating...';
  document.getElementById('statusMsg').textContent = '';

  let done = 0;
  for (let i = 0; i < TABLES.length; i++) {
    await createTable(baseUrl, token, TABLES[i], i);
    done++;
    document.getElementById('progressFill').style.width = `${Math.round((done / TABLES.length) * 100)}%`;
  }

  btn.textContent = 'Create all 8 tables';
  btn.disabled = false;

  const count = Object.keys(results).length;
  document.getElementById('statusMsg').textContent = count === TABLES.length
    ? `All ${TABLES.length} tables created successfully.`
    : `${count}/${TABLES.length} tables created — check errors above.`;

  if (count > 0) {
    showOutput();
    document.getElementById('copyBtn').disabled = false;
  }
}

function showOutput() {
  const lines = TABLES.map(t => `${t.name}:\n  ${results[t.name] || 'ERROR'}`).join('\n\n');
  document.getElementById('output').textContent = lines;
  document.getElementById('output').style.display = 'block';
}

function copyIds() {
  const text = TABLES.map(t => `${t.name}: ${results[t.name] || 'ERROR'}`).join('\n');
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('statusMsg').textContent = 'IDs copied to clipboard.';
  });
}

renderGrid();
</script>
</body>
</html>
